name: Fetch Manager & SUSFS Module

permissions:
  contents: read
  actions: read

on:
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string
    outputs:
      susVer:
        description: "Fetched SUSFS version"
        value: ${{ jobs.get_ksu_manager.outputs.susVer }}
      ksuVer:
        description: "Calculated KSU version"
        value: ${{ jobs.get_ksu_manager.outputs.ksuVer }}

jobs:
  get_ksu_manager:
    name: "Download Manager & Module"
    runs-on: ubuntu-latest
    outputs:
      ksuVer: ${{ steps.get_version.outputs.kversion }}
      susVer: ${{ steps.get_version.outputs.sversion }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ==========================================
      # 1. Environment & Dependencies Setup
      # ==========================================
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl jq unzip

      # ==========================================
      # 2. Version Calculation
      # ==========================================
      - name: Calculate Versions (Fast Fetch)
        id: get_version
        run: |
          if [ "${{ inputs.kernelsu_variant }}" == "SukiSU" ]; then
            git clone --filter=blob:none https://github.com/SukiSU-Ultra/SukiSU-Ultra.git KernelSU
          elif [ "${{ inputs.kernelsu_variant }}" == "ReSukiSU" ]; then
            git clone --filter=blob:none https://github.com/ReSukiSU/ReSukiSU.git KernelSU
          else
            git clone --filter=blob:none https://github.com/tiann/KernelSU.git KernelSU
          fi

          cd KernelSU
          KSU_GIT_VERSION=$(git rev-list --count HEAD)

          if [ "${{ inputs.kernelsu_variant }}" == "SukiSU" ]; then
            KSU_VERSION=$((40000 + KSU_GIT_VERSION - 2815))
          elif [ "${{ inputs.kernelsu_variant }}" == "ReSukiSU" ]; then
            KSU_VERSION=$((30700 + KSU_GIT_VERSION))
          else
            KSU_VERSION=$((20000 + KSU_GIT_VERSION))
          fi
          echo "KSU_VERSION=$KSU_VERSION" >> $GITHUB_ENV
          echo "kversion=$KSU_VERSION" >> $GITHUB_OUTPUT

          INFO_URL="https://gitlab.com/simonpunk/susfs4ksu/-/raw/gki-android14-6.1/ksu_module_susfs/module.prop?inline=false"
          SUS_VERSION=$(curl -sL "$INFO_URL" | grep '^version=' | cut -d'=' -f2)
          [ -z "$SUS_VERSION" ] && SUS_VERSION="Unknown"
          echo "sversion=$SUS_VERSION" >> $GITHUB_OUTPUT

      # ==========================================
      # 3. Fetch Manager APK
      # ==========================================
      - name: Download KernelSU Manager APK
        id: fetch_manager
        run: |
          if [ "${{ inputs.kernelsu_variant }}" == "SukiSU" ]; then
            REPO="SukiSU-Ultra/SukiSU-Ultra"
          elif [ "${{ inputs.kernelsu_variant }}" == "ReSukiSU" ]; then
            REPO="ReSukiSU/ReSukiSU"
          else
            REPO="tiann/KernelSU"
          fi

          BUILD_ID=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/actions/workflows/build-manager.yml/runs?status=success&per_page=1" | jq -r '.workflow_runs[0].id')
          
          if [ "$BUILD_ID" == "null" ] || [ -z "$BUILD_ID" ]; then
            echo "[ERROR] Could not find a successful manager build."
            exit 1
          fi

          ARTIFACT_URL=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/$REPO/actions/runs/$BUILD_ID/artifacts" | jq -r '.artifacts[] | select(.name | ascii_downcase | contains("manager")) | .archive_download_url' | head -n 1)

          if [ -z "$ARTIFACT_URL" ]; then
            echo "[ERROR] Artifact not found."
            exit 1
          fi

          mkdir -p manager-apk
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -o manager.zip "$ARTIFACT_URL"
          unzip -o manager.zip -d manager-apk/

      # ==========================================
      # 4. Fetch SUSFS Module
      # ==========================================
      - name: Download SUSFS Module
        id: fetch_susfs
        continue-on-error: true
        run: |
          BUILD_ID=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/workflows/build.yml/runs?status=success&per_page=1" | jq -r '.workflow_runs[0].id')
          
          if [ "$BUILD_ID" != "null" ]; then
            ARTIFACTS=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/sidex15/susfs4ksu-module/actions/runs/$BUILD_ID/artifacts")
            
            DL_URL=$(echo "$ARTIFACTS" | jq -r '.artifacts[0].archive_download_url')
            MOD_NAME=$(echo "$ARTIFACTS" | jq -r '.artifacts[0].name')
            echo "SUSFS_NAME=$MOD_NAME" >> $GITHUB_ENV
            
            curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -o susfs.zip "$DL_URL"
            mkdir -p susfs-module
            unzip -q susfs.zip -d susfs-temp/
            
            cd susfs-temp
            if ls *.zip 1>/dev/null 2>&1; then
              mv *.zip ../susfs-module/
            else
              zip -qr "../susfs-module/ksu_module_susfs.zip" .
            fi
            cd ..
          fi

      # ==========================================
      # 5. Upload Artifacts
      # ==========================================
      - name: Upload Manager APK
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.kernelsu_variant }}-Manager_v${{ env.KSU_VERSION }}
          path: manager-apk/**/*.apk
          compression-level: 9

      - name: Upload SUSFS Module
        if: steps.fetch_susfs.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: SUSFS-Module_${{ env.SUSFS_NAME }}
          path: susfs-module/*
          compression-level: 9
