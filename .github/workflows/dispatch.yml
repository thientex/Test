name: Custom Kernel Build - Dispatch

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==========================================
      # Core Configurations
      # ==========================================
      android_version:
        description: "Android Version"
        required: true
        type: choice
        options:
          - android12
          - android13
          - android14
          - android15
          - android16
        default: android12
      kernel_version:
        description: "Kernel Version"
        required: true
        type: choice
        options:
          - "5.10"
          - "5.15"
          - "6.1"
          - "6.6"
          - "6.12"
        default: "5.10"
      sub_level:
        description: "Kernel Sublevel"
        required: true
        type: string
        default: "236"
      os_patch_level:
        description: "OS Security Patch Level"
        required: true
        type: string
        default: "2025-05"
      revision:
        description: "Revision"
        required: false
        type: string
        default: "r1"

      # ==========================================
      # KernelSU Configurations
      # ==========================================
      kernelsu_variant:
        description: "KernelSU Variant"
        required: true
        type: choice
        options:
          - Official
          - SukiSU
          - ReSukiSU
        default: SukiSU
      kernelsu_branch:
        description: "KernelSU Branch"
        required: true
        type: choice
        options:
          - Stable
          - Dev
        default: Stable
      sukisu_commit:
        description: "SukiSU Custom Commit Hash"
        required: false
        type: string
      susfs_commit:
        description: "SUSFS Custom Commit Hash"
        required: false
        type: string

      # ==========================================
      # Feature Toggles
      # ==========================================
      enable_susfs:
        description: "Enable SUSFS"
        required: true
        type: boolean
        default: true
      enable_susfs_log:
        description: "Enable SUSFS Logging"
        required: true
        type: boolean
        default: false
      enable_kpm:
        description: "Enable KPM"
        required: true
        type: boolean
        default: false

      # ==========================================
      # Build Extras
      # ==========================================
      version_name:
        description: "Custom Version Name"
        required: false
        type: string
      build_time:
        description: "Custom Build Timestamp"
        required: false
        type: string
      get_manager:
        description: "Fetch Manager APK"
        required: false
        type: boolean
        default: false

jobs:
  build-custom-kernel:
    name: "Build: ${{ inputs.kernel_version }}.${{ inputs.sub_level }} (${{ inputs.kernelsu_variant }})"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ inputs.android_version }}
      kernel_version: ${{ inputs.kernel_version }}
      sub_level: ${{ inputs.sub_level }}
      os_patch_level: ${{ inputs.os_patch_level }}
      revision: ${{ inputs.revision || 'r1' }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      sukisu_commit: ${{ inputs.sukisu_commit || '' }}
      susfs_commit: ${{ inputs.susfs_commit || '' }}
      version: ${{ inputs.version_name || '' }}
      build_time: ${{ inputs.build_time || '' }}
      enable_susfs: ${{ inputs.enable_susfs }}
      enable_susfs_log: ${{ inputs.enable_susfs_log }}
      enable_kpm: ${{ inputs.enable_kpm }}

  get-ksu-manager:
    if: ${{ inputs.get_manager }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
